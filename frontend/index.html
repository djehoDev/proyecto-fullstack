<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Eventos</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <div class="container">

    <h1>Gestión de Eventos</h1>

    <div id="mensaje" role="status" aria-live="polite"></div>

    <!-- Formulario -->
    <form id="formEvento">
        <input type="text" id="titulo" placeholder="Título" required>
        <input type="text" id="descripcion" placeholder="Descripción">
        <input type="date" id="fecha" required>
        <input type="text" id="ubicacion" placeholder="Ubicación">
        <select id="categoria">
            <option value="">Sin categoría</option>
            <option value="Música">Música</option>
            <option value="Deporte">Deporte</option>
            <option value="Cultura">Cultura</option>
            <option value="Social">Social</option>
        </select>

        <button type="submit">Crear Evento</button>
    </form>

    <hr>

    <h2>Filtros</h2>

    <select id="filtroCategoria">
        <option value="">Todas las categorías</option>
        <option value="Música">Música</option>
        <option value="Deporte">Deporte</option>
        <option value="Cultura">Cultura</option>
        <option value="Social">Social</option>
    </select>

    <input type="text" id="filtroUbicacion" placeholder="Ubicación">

    <button onclick="filtrarEventos()">Filtrar</button>
    <button onclick="limpiarFiltros()">Limpiar</button>

    <hr>

    <template id="plantillaEvento">
        <div class="evento">
            <h3 class="titulo"></h3>
            <p class="descripcion"></p>
            <p><b>Fecha:</b> <span class="fecha"></span></p>
            <p><b>Ubicación:</b> <span class="ubicacion"></span></p>
            <p><b>Categoría:</b> <span class="categoria"></span></p>
            <button class="btnEliminar">Eliminar</button>
            <button class="btnEditar">Editar</button>
            <button class="btnCompartir" title="Compartir">
                <i class="fa-solid fa-share-nodes"></i>
            </button>
        </div>
    </template>

    <!-- Lista -->
    <div id="listaEventos"></div>

    <script src="js/index.js"></script>

    </div>
</body>
</html>
